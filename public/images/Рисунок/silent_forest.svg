<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Sky background gradient -->
  <defs>
    <linearGradient id="forest-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#081C15" />
      <stop offset="50%" stop-color="#1B4332" />
      <stop offset="100%" stop-color="#2D6A4F" />
    </linearGradient>
    <linearGradient id="sun-beams" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8F3DC" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#B7E4C7" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#2D6A4F" stop-opacity="0" />
    </linearGradient>
    <filter id="forest-blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <filter id="painterly" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Forest Background -->
  <rect width="800" height="600" fill="url(#forest-bg)" />

  <!-- Sun Rays / Beams of Light -->
  <polygon points="100,-50 350,-50 600,650 200,650" fill="url(#sun-beams)" />
  <polygon points="300,-50 450,-50 800,550 500,650" fill="url(#sun-beams)" opacity="0.7" />

  <!-- Distant Trees (blurred & painterly) -->
  <g filter="url(#forest-blur)" opacity="0.4">
    <path d="M150,600 L180,420 L210,600 Z" fill="#081C15" />
    <path d="M250,600 L290,380 L330,600 Z" fill="#081C15" />
    <path d="M450,600 L490,400 L530,600 Z" fill="#081C15" />
    <path d="M600,600 L640,430 L680,600 Z" fill="#081C15" />
  </g>

  <!-- Midground Trees -->
  <g opacity="0.7" filter="url(#painterly)">
    <path d="M80,600 L120,320 L160,600 Z" fill="#132A13" />
    <path d="M350,600 L395,280 L440,600 Z" fill="#132A13" />
    <path d="M520,600 L560,300 L600,600 Z" fill="#1B4332" />
    <path d="M700,600 L740,310 L780,600 Z" fill="#132A13" />
  </g>

  <!-- Foreground Trees (Solid details) -->
  <g filter="url(#painterly)">
    <!-- Tree trunks & branches -->
    <rect x="220" y="200" width="35" height="400" fill="#081C15" />
    <path d="M235,320 C200,280 180,260 170,250" stroke="#081C15" stroke-width="10" stroke-linecap="round" />
    <path d="M235,280 C270,240 290,220 310,210" stroke="#081C15" stroke-width="8" stroke-linecap="round" />

    <rect x="620" y="150" width="45" height="450" fill="#040F0C" />
    <path d="M640,300 C600,250 580,230 550,210" stroke="#040F0C" stroke-width="12" stroke-linecap="round" />
    <path d="M640,240 C680,180 710,160 730,150" stroke="#040F0C" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Glowing particles in the light beams -->
  <circle cx="280" cy="250" r="4" fill="#D8F3DC" opacity="0.8" />
  <circle cx="350" cy="420" r="6" fill="#B7E4C7" opacity="0.6" />
  <circle cx="480" cy="310" r="5" fill="#D8F3DC" opacity="0.5" />
  <circle cx="580" cy="480" r="3" fill="#B7E4C7" opacity="0.7" />
  <circle cx="180" cy="380" r="4" fill="#D8F3DC" opacity="0.4" />

  <!-- Forest Floor Ground -->
  <path d="M-10,580 Q200,550 400,570 T810,560 L810,610 L-10,610 Z" fill="#081C15" filter="url(#painterly)" />
</svg>
