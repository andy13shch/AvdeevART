<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Sky background gradient -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="40%" stop-color="#1C2541" />
      <stop offset="70%" stop-color="#5BC0BE" />
      <stop offset="100%" stop-color="#F4D35E" />
    </linearGradient>
    <linearGradient id="reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4D35E" stop-opacity="0.8" />
      <stop offset="30%" stop-color="#5BC0BE" stop-opacity="0.7" />
      <stop offset="70%" stop-color="#1C2541" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0B132B" />
    </linearGradient>
    <filter id="painterly" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Background Sky -->
  <rect width="800" height="350" fill="url(#sky)" />

  <!-- Sun -->
  <circle cx="400" cy="340" r="70" fill="#EE964B" opacity="0.9" filter="url(#painterly)" />
  <circle cx="400" cy="340" r="50" fill="#F4D35E" filter="url(#painterly)" />

  <!-- Mountain Silhouettes -->
  <path d="M-50,350 L150,180 L350,350 Z" fill="#0E1525" opacity="0.7" />
  <path d="M500,350 L680,120 L850,350 Z" fill="#0E1525" opacity="0.8" />
  <path d="M200,350 L420,220 L650,350 Z" fill="#0A0F1D" />

  <!-- Water Surface (Reflection) -->
  <rect y="350" width="800" height="250" fill="url(#reflection)" />

  <!-- Sun Reflection on Water with painterly ripples -->
  <ellipse cx="400" cy="400" rx="90" ry="12" fill="#F4D35E" opacity="0.7" filter="url(#painterly)" />
  <ellipse cx="400" cy="450" rx="140" ry="8" fill="#EE964B" opacity="0.5" filter="url(#painterly)" />
  <ellipse cx="400" cy="500" rx="200" ry="5" fill="#F4D35E" opacity="0.4" filter="url(#painterly)" />

  <!-- Horizontal paint/water strokes -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#5BC0BE" stroke-width="3" opacity="0.6" stroke-dasharray="80 40 120 50" filter="url(#painterly)" />
  <line x1="50" y1="420" x2="750" y2="420" stroke="#1C2541" stroke-width="4" opacity="0.5" stroke-dasharray="150 50 80" filter="url(#painterly)" />
  <line x1="200" y1="480" x2="600" y2="480" stroke="#EE964B" stroke-width="2" opacity="0.7" stroke-dasharray="100 80" filter="url(#painterly)" />
  <line x1="300" y1="530" x2="500" y2="530" stroke="#F4D35E" stroke-width="2" opacity="0.8" stroke-dasharray="50 30" filter="url(#painterly)" />
</svg>
